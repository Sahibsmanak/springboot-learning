spring.application.name=hibernatedemo

# Data Source URLs for the connection with MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/student_tracker
spring.datasource.username=springstudent
spring.datasource.password=springstudent

# Turn off the spring boot banner
spring.main.banner-mode=off

# Reduce logging leveel set logging level to warn
logging.level.root=warn

#Add logging configs to display SQL Statements
# Below log SQL Statements
logging.level.org.hibernate.SQL=debug

# Below logs for SQL Statements
logging.level.org.hibernate.orm.jdbc.bind=trace

# Configure JPA/Hibernate to auto create the tables
# If you want to drop and create whenever application starts use create but if you want to keep the previous data use update
#spring.jpa.hibernate.ddl-auto=create
spring.jpa.hibernate.ddl-auto=update
